worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    map $http_x_forwarded_proto $protocolo_original {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    upstream django_backend {
        server backend:8000;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;
        client_max_body_size 30m;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(self)" always;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location /api/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $protocolo_original;
            proxy_connect_timeout 15s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /admin/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $protocolo_original;
            proxy_read_timeout 60s;
        }

        location /static/ {
            alias /srv/django/static/;
            access_log off;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        location /media/ {
            alias /srv/django/media/;
            access_log off;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /assets/ {
            try_files $uri =404;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = /index.html {
            add_header Cache-Control "no-store";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
